server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

spring:

  jpa:
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:/db/migrations/common

  datasource:
    driver-class-name: org.postgresql.Driver

  jackson:
    deserialization:
      use-big-decimal-for-floats: true

hmpps-auth:
  url: "http://localhost:8090/auth"

hmpps:
  sqs:
    provider: localstack
    queues:
      domainevents:
        queueName: prisoner-finance-event-queue
        dlqName: prisoner-finance-event-dlq
        subscribeTopicId: domainevents
        subscribeFilter: '{"eventType":[ "prison-offender-events.prisoner.merged" ] }'
    topics:
      domainevents:
        arn: arn:aws:sns:eu-west-2:000000000000:11111111-2222-3333-4444-555555555555

general-ledger-api:
    url: http://localhost:8091

springdoc:
  packages-to-scan: uk.gov.justice.digital.hmpps.prisonerfinancesyncapi
  packages-to-exclude:
    - uk.gov.justice.digital.hmpps.prisonerfinancesyncapi.clients
  api-docs:
    enabled: true
  swagger-ui:
    version: 5.32.2
    enabled: true

generic-service:
  env:
    FEATURE_GENERAL_LEDGER_API_ENABLED: "true"
    FEATURE_GENERAL_LEDGER_API_TEST_PRISONER_IDS: "A9971EC,A0394ED,G9745UF,A1477EC,A9682DZ,A5709DZ,G3349UQ,G6556VD,A6259EC,A8474DY,G3860UW,G7209UD,A6396EC,A9554EC,G9529VP,G1947VG,G0485VO,G2292UN,A3617EC,A9716EC,G1783UK,G3410GN,A8256EC,A7582EC,G2084VA"
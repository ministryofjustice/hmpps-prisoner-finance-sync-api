server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

spring:

  jpa:
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:/db/migrations/common

  datasource:
    driver-class-name: org.postgresql.Driver

  jackson:
    deserialization:
      use-big-decimal-for-floats: true

hmpps-auth:
  url: "http://localhost:8090/auth"

general-ledger-api:
    url: http://localhost:8091


springdoc:
  packages-to-scan: uk.gov.justice.digital.hmpps.prisonerfinancesyncapi
  packages-to-exclude:
    - uk.gov.justice.digital.hmpps.prisonerfinancesyncapi.clients
  api-docs:
    enabled: true
  swagger-ui:
    version: 5.32.2
    enabled: true

